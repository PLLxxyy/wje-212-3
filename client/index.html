<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>邻里互助 - 社区互助平台</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: #f5f7fa;
      color: #333;
      min-height: 100vh;
    }

    #root {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #4CAF50 0%, #2E7D32 100%);
      color: white;
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .header-inner {
      max-width: 960px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }

    .header-logo {
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-logo span {
      font-size: 24px;
    }

    .header-nav {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .header-nav a, .header-nav button {
      color: rgba(255,255,255,0.9);
      text-decoration: none;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 14px;
      border: none;
      background: none;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .header-nav a:hover, .header-nav button:hover {
      background: rgba(255,255,255,0.15);
    }

    .header-nav a.active {
      background: rgba(255,255,255,0.25);
      font-weight: 600;
    }

    .header-user {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }

    .header-user .user-name {
      font-weight: 600;
    }

    .header-user .user-points {
      background: rgba(255,255,255,0.2);
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 12px;
    }

    /* Main content */
    .main-content {
      flex: 1;
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
      padding: 20px;
    }

    /* Auth page */
    .auth-container {
      max-width: 420px;
      margin: 60px auto;
      background: white;
      border-radius: 12px;
      padding: 40px 32px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .auth-title {
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      color: #2E7D32;
      margin-bottom: 8px;
    }

    .auth-subtitle {
      text-align: center;
      color: #888;
      font-size: 14px;
      margin-bottom: 28px;
    }

    .auth-toggle {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #666;
    }

    .auth-toggle a {
      color: #4CAF50;
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
    }

    .auth-toggle a:hover {
      text-decoration: underline;
    }

    /* Forms */
    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
    }

    .form-group input, .form-group select, .form-group textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: white;
      color: #333;
      outline: none;
      font-family: inherit;
    }

    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: #4CAF50;
      box-shadow: 0 0 0 3px rgba(76,175,80,0.12);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      white-space: nowrap;
    }

    .btn-primary {
      background: #4CAF50;
      color: white;
    }

    .btn-primary:hover {
      background: #388E3C;
    }

    .btn-primary:disabled {
      background: #a5d6a7;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: #f5f5f5;
      color: #555;
      border: 1px solid #ddd;
    }

    .btn-secondary:hover {
      background: #eee;
    }

    .btn-danger {
      background: #ef5350;
      color: white;
    }

    .btn-danger:hover {
      background: #d32f2f;
    }

    .btn-warn {
      background: #FF9800;
      color: white;
    }

    .btn-warn:hover {
      background: #F57C00;
    }

    .btn-sm {
      padding: 6px 14px;
      font-size: 13px;
    }

    .btn-block {
      width: 100%;
    }

    .btn-outline {
      background: transparent;
      border: 1.5px solid #4CAF50;
      color: #4CAF50;
    }

    .btn-outline:hover {
      background: #4CAF50;
      color: white;
    }

    /* Cards */
    .card {
      background: white;
      border-radius: 10px;
      padding: 16px 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      transition: box-shadow 0.2s;
    }

    .card:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    /* Request card */
    .request-card {
      background: white;
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      cursor: pointer;
      transition: all 0.2s;
      border-left: 4px solid transparent;
    }

    .request-card:hover {
      box-shadow: 0 3px 12px rgba(0,0,0,0.1);
      transform: translateY(-1px);
    }

    .request-card.status-open {
      border-left-color: #4CAF50;
    }

    .request-card.status-accepted {
      border-left-color: #FF9800;
    }

    .request-card.status-in_progress {
      border-left-color: #2196F3;
    }

    .request-card.status-completed {
      border-left-color: #9E9E9E;
    }

    .request-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .request-type {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      color: white;
    }

    .type-代买 { background: #42A5F5; }
    .type-搬运 { background: #FF7043; }
    .type-维修 { background: #AB47BC; }
    .type-照看 { background: #EC407A; }
    .type-辅导 { background: #26A69A; }
    .type-跑腿 { background: #FFA726; }

    .request-status {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }

    .status-open { background: #E8F5E9; color: #2E7D32; }
    .status-accepted { background: #FFF3E0; color: #EF6C00; }
    .status-in_progress { background: #E3F2FD; color: #1565C0; }
    .status-completed { background: #F5F5F5; color: #757575; }

    .request-desc {
      font-size: 14px;
      color: #444;
      line-height: 1.5;
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .request-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 12px;
      color: #999;
    }

    .request-meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .request-reward {
      font-weight: 700;
      color: #E65100;
    }

    /* Filter bar */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
      align-items: center;
    }

    .filter-bar input {
      padding: 8px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      min-width: 200px;
      transition: border-color 0.2s;
    }

    .filter-bar input:focus {
      border-color: #4CAF50;
    }

    .filter-chip {
      padding: 6px 14px;
      border-radius: 16px;
      font-size: 13px;
      border: 1.5px solid #ddd;
      background: white;
      cursor: pointer;
      transition: all 0.2s;
      color: #666;
    }

    .filter-chip:hover {
      border-color: #4CAF50;
      color: #4CAF50;
    }

    .filter-chip.active {
      background: #4CAF50;
      color: white;
      border-color: #4CAF50;
    }

    /* Page title */
    .page-title {
      font-size: 22px;
      font-weight: 700;
      color: #222;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Detail page */
    .detail-card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      margin-bottom: 16px;
    }

    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .detail-row {
      display: flex;
      align-items: flex-start;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-label {
      width: 100px;
      font-size: 14px;
      color: #888;
      flex-shrink: 0;
    }

    .detail-value {
      font-size: 14px;
      color: #333;
      flex: 1;
      line-height: 1.6;
    }

    .detail-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    /* Profile page */
    .profile-header {
      background: linear-gradient(135deg, #4CAF50 0%, #2E7D32 100%);
      color: white;
      border-radius: 12px;
      padding: 28px 24px;
      margin-bottom: 20px;
    }

    .profile-name {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .profile-info {
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 16px;
    }

    .profile-stats {
      display: flex;
      gap: 24px;
    }

    .profile-stat {
      text-align: center;
    }

    .profile-stat-value {
      font-size: 24px;
      font-weight: 700;
    }

    .profile-stat-label {
      font-size: 12px;
      opacity: 0.8;
    }

    .tab-bar {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
      border-bottom: 2px solid #eee;
      padding-bottom: 0;
    }

    .tab-bar button {
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      background: none;
      cursor: pointer;
      color: #888;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
    }

    .tab-bar button:hover {
      color: #4CAF50;
    }

    .tab-bar button.active {
      color: #4CAF50;
      border-bottom-color: #4CAF50;
    }

    /* Leaderboard */
    .leaderboard-list {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .leaderboard-item {
      display: flex;
      align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid #f5f5f5;
      transition: background 0.2s;
    }

    .leaderboard-item:hover {
      background: #f9f9f9;
    }

    .leaderboard-item:last-child {
      border-bottom: none;
    }

    .leaderboard-rank {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      margin-right: 14px;
      flex-shrink: 0;
    }

    .rank-1 { background: linear-gradient(135deg, #FFD700, #FFA000); color: white; }
    .rank-2 { background: linear-gradient(135deg, #C0C0C0, #9E9E9E); color: white; }
    .rank-3 { background: linear-gradient(135deg, #CD7F32, #A0522D); color: white; }
    .rank-other { background: #f0f0f0; color: #888; }

    .leaderboard-info {
      flex: 1;
    }

    .leaderboard-name {
      font-weight: 600;
      font-size: 15px;
      color: #333;
    }

    .leaderboard-building {
      font-size: 12px;
      color: #aaa;
      margin-top: 2px;
    }

    .leaderboard-points {
      text-align: right;
    }

    .leaderboard-points-value {
      font-size: 18px;
      font-weight: 700;
      color: #E65100;
    }

    .leaderboard-points-label {
      font-size: 11px;
      color: #aaa;
    }

    .leaderboard-help-count {
      text-align: right;
      margin-left: 20px;
    }

    .leaderboard-help-value {
      font-size: 16px;
      font-weight: 600;
      color: #4CAF50;
    }

    .leaderboard-help-label {
      font-size: 11px;
      color: #aaa;
    }

    /* Rating stars */
    .rating-stars {
      display: flex;
      gap: 4px;
    }

    .rating-star {
      font-size: 28px;
      cursor: pointer;
      color: #ddd;
      transition: color 0.15s;
      user-select: none;
    }

    .rating-star.filled {
      color: #FFC107;
    }

    .rating-star:hover {
      color: #FFB300;
    }

    /* Review card */
    .review-card {
      background: #FFFDE7;
      border-radius: 8px;
      padding: 14px 16px;
      margin-top: 12px;
    }

    .review-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }

    .review-stars {
      color: #FFC107;
      font-size: 14px;
    }

    .review-text {
      font-size: 14px;
      color: #555;
      line-height: 1.5;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: #bbb;
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .empty-state-text {
      font-size: 15px;
    }

    /* Error message */
    .error-msg {
      background: #FFEBEE;
      color: #C62828;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 12px;
    }

    .success-msg {
      background: #E8F5E9;
      color: #2E7D32;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 12px;
    }

    /* Modal overlay */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 20px;
    }

    .modal-content {
      background: white;
      border-radius: 12px;
      padding: 28px;
      max-width: 460px;
      width: 100%;
      box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
      color: #333;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .main-content {
        padding: 12px;
      }
      .form-row {
        grid-template-columns: 1fr;
      }
      .header-inner {
        height: 50px;
      }
      .header-logo {
        font-size: 17px;
      }
      .header-nav a, .header-nav button {
        padding: 6px 10px;
        font-size: 13px;
      }
      .filter-bar input {
        min-width: 140px;
      }
      .profile-stats {
        gap: 16px;
      }
      .detail-card {
        padding: 16px;
      }
    }

    /* Loading spinner */
    .loading {
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    /* QA Section */
    .qa-section {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .qa-section-title {
      font-size: 16px;
      font-weight: 700;
      color: #333;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .qa-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .qa-item {
      background: #fafafa;
      border-radius: 8px;
      padding: 12px 14px;
    }

    .qa-item.is-reply {
      background: #f0f7ff;
      margin-left: 24px;
    }

    .qa-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .qa-item-user {
      font-size: 13px;
      font-weight: 600;
      color: #2E7D32;
    }

    .qa-item-user .qa-user-building {
      font-weight: 400;
      color: #999;
      font-size: 12px;
      margin-left: 6px;
    }

    .qa-item-time {
      font-size: 12px;
      color: #aaa;
    }

    .qa-item-content {
      font-size: 14px;
      color: #333;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .qa-item-actions {
      margin-top: 8px;
    }

    .qa-reply-btn {
      font-size: 12px;
      color: #4CAF50;
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 0;
    }

    .qa-reply-btn:hover {
      text-decoration: underline;
    }

    .qa-empty {
      text-align: center;
      padding: 32px 20px;
      color: #bbb;
      font-size: 14px;
    }

    .qa-form {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #f0f0f0;
    }

    .qa-form-label {
      font-size: 14px;
      font-weight: 600;
      color: #555;
      margin-bottom: 8px;
    }

    .qa-form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 10px;
    }

    .qa-login-tip {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #f0f0f0;
      text-align: center;
      font-size: 13px;
      color: #888;
    }

    .qa-login-tip a {
      color: #4CAF50;
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }

    .qa-login-tip a:hover {
      text-decoration: underline;
    }

    .qa-reply-form {
      margin-top: 10px;
      padding: 12px;
      background: white;
      border-radius: 6px;
      border: 1px solid #e0e0e0;
    }

    .qa-reply-form textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      resize: vertical;
      min-height: 60px;
      font-family: inherit;
    }

    .qa-reply-form textarea:focus {
      border-color: #4CAF50;
    }

    .qa-reply-form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 8px;
    }

    .qa-reply-form-actions .btn {
      padding: 6px 14px;
      font-size: 12px;
    }


    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #eee;
      border-top-color: #4CAF50;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 16px;
      color: #bbb;
      font-size: 12px;
      margin-top: auto;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
